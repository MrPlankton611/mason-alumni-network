name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths: ['alumni/**', '.github/workflows/pages.yml']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Cache-bust styles.css and share.js
        run: |
          SHA="${GITHUB_SHA::7}"
          sed -i "s/styles\.css\"/styles.css?v=$SHA\"/" alumni/*.html
          sed -i "s/share\.js\"/share.js?v=$SHA\"/" alumni/*.html
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: alumni
      - id: deployment
        uses: actions/deploy-pages@v4
